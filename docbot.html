<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocBot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #ffffff;
    border-right: 1px solid #e8e8e6;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
  }

  #sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid #e8e8e6;
    display: flex;
    align-items: center;
    gap: 9px;
  }

  #sidebar-header svg { opacity: 0.8; flex-shrink: 0; }

  #sidebar-header span {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }

  #sidebar-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

  /* Upload zone */
  #upload-zone {
    border: 1px dashed #d0d0cc;
    border-radius: 8px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  #upload-zone:hover { background: #fafaf8; border-color: #b0b0aa; }
  #upload-zone.dragover { background: #f0f0ee; border-color: #888; }

  #upload-zone svg { opacity: 0.35; margin-bottom: 8px; }

  #upload-zone p {
    font-size: 12px;
    color: #888;
    line-height: 1.5;
  }

  #upload-zone span {
    font-size: 12px;
    color: #1a1a1a;
    font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
  }

  #file-input { display: none; }

  /* Doc info */
  #doc-info { display: none; }

  .doc-card {
    background: #f8f8f6;
    border: 1px solid #e8e8e6;
    border-radius: 8px;
    padding: 10px 12px;
  }

  .doc-card .doc-name {
    font-size: 12px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 2px;
    word-break: break-word;
  }

  .doc-card .doc-meta {
    font-size: 11px;
    color: #999;
  }

  .section-label {
    font-size: 10px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }

  .summary-text {
    font-size: 12px;
    color: #555;
    line-height: 1.6;
  }

  /* Suggested questions */
  .suggested-btn {
    width: 100%;
    text-align: left;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #e8e8e6;
    background: #fff;
    font-size: 12px;
    color: #444;
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.12s, border-color 0.12s;
    line-height: 1.4;
  }

  .suggested-btn:hover { background: #f5f5f3; border-color: #ccc; }

  /* Sidebar footer */
  #sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid #e8e8e6;
    display: none;
    gap: 8px;
  }

  .footer-btn {
    flex: 1;
    padding: 7px 0;
    border-radius: 6px;
    border: 1px solid #e8e8e6;
    background: #fff;
    font-size: 12px;
    color: #555;
    cursor: pointer;
    transition: background 0.12s;
  }

  .footer-btn:hover { background: #f5f5f3; }

  /* Processing indicator */
  #processing {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #888;
    padding: 10px 12px;
    background: #f8f8f6;
    border-radius: 8px;
    border: 1px solid #e8e8e6;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 1.5px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Main chat ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid #e8e8e6;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 57px;
  }

  #chat-header-doc {
    font-size: 13px;
    color: #888;
  }

  #chat-header-count {
    font-size: 12px;
    color: #bbb;
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #bbb;
  }

  #empty-state svg { opacity: 0.25; }

  #empty-state p:first-of-type {
    font-size: 14px;
    font-weight: 500;
    color: #888;
  }

  #empty-state p:last-of-type {
    font-size: 12px;
    color: #bbb;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #e8e8e6;
    background: #f5f5f3;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .avatar svg { opacity: 0.5; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    border: 1px solid #e8e8e6;
  }

  .message.bot .bubble {
    background: #f8f8f6;
    color: #1a1a1a;
    border-radius: 4px 12px 12px 12px;
  }

  .message.user .bubble {
    background: #fff;
    color: #1a1a1a;
    border-radius: 12px 4px 12px 12px;
  }

  /* Thinking indicator */
  .thinking .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: #aaa;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* Input */
  #input-area {
    padding: 14px 24px;
    border-top: 1px solid #e8e8e6;
    background: #fff;
  }

  #input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1px solid #e0e0de;
    border-radius: 10px;
    background: #fff;
    transition: border-color 0.15s;
  }

  #input-wrap:focus-within { border-color: #aaa; }

  #question-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13px;
    color: #1a1a1a;
    background: transparent;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    max-height: 100px;
  }

  #question-input::placeholder { color: #bbb; }

  #send-btn {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    border: 1px solid #e0e0de;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s;
  }

  #send-btn:hover { background: #333; }
  #send-btn:disabled { background: #e0e0de; cursor: not-allowed; }
  #send-btn svg { opacity: 0.9; }

  #input-hint {
    font-size: 11px;
    color: #bbb;
    margin-top: 6px;
    padding-left: 2px;
  }

  /* Hidden when doc not loaded */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <div id="sidebar-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
      <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
    </svg>
    <span>DocBot</span>
  </div>

  <div id="sidebar-body">

    <!-- Upload zone -->
    <div id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p><span>Click to upload</span> or drag and drop</p>
      <p style="margin-top:4px; font-size:11px;">PDF, DOCX, TXT, JPG, PNG</p>
    </div>
    <input type="file" id="file-input" accept=".pdf,.docx,.txt,.jpg,.jpeg,.png" onchange="handleFileSelect(event)">

    <!-- Processing -->
    <div id="processing">
      <div class="spinner"></div>
      <span>Processing document...</span>
    </div>

    <!-- Doc info (shown after upload) -->
    <div id="doc-info">
      <div class="doc-card">
        <div class="doc-name" id="doc-name-text"></div>
        <div class="doc-meta" id="doc-meta-text"></div>
      </div>

      <div style="margin-top: 14px;">
        <div class="section-label">Summary</div>
        <div class="summary-text" id="summary-text"></div>
      </div>

      <div style="margin-top: 14px;">
        <div class="section-label">Suggested</div>
        <div id="suggested-container"></div>
      </div>
    </div>

  </div>

  <div id="sidebar-footer">
    <button class="footer-btn" onclick="newDoc()">New document</button>
    <button class="footer-btn" onclick="clearChat()">Clear chat</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="main">

  <div id="chat-header">
    <span id="chat-header-doc" style="color:#bbb;">No document loaded</span>
    <span id="chat-header-count"></span>
  </div>

  <!-- Empty state -->
  <div id="empty-state">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
      <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
    </svg>
    <p>Upload a document to get started</p>
    <p>Supports PDF, DOCX, TXT, JPG, PNG</p>
  </div>

  <!-- Messages -->
  <div id="messages" class="hidden"></div>

  <!-- Input -->
  <div id="input-area" class="hidden">
    <div id="input-wrap">
      <textarea id="question-input" placeholder="Ask anything about your document..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendQuestion()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">Press Enter to send, Shift+Enter for new line</div>
  </div>

</div>

<script>
  const API = "http://localhost:5000";
  let messageCount = 0;
  let docLoaded = false;

  // ── File handling ──────────────────────────────────────────────────────────

  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById("upload-zone").classList.add("dragover");
  }

  function handleDragLeave(e) {
    document.getElementById("upload-zone").classList.remove("dragover");
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById("upload-zone").classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) uploadFile(file);
  }

  async function uploadFile(file) {
    document.getElementById("processing").style.display = "flex";
    document.getElementById("doc-info").style.display = "none";
    document.getElementById("upload-zone").style.display = "none";

    const formData = new FormData();
    formData.append("file", file);

    try {
      const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
      const data = await res.json();

      if (data.error) {
        alert("Error: " + data.error);
        resetUpload();
        return;
      }

      document.getElementById("processing").style.display = "none";
      document.getElementById("doc-info").style.display = "block";
      document.getElementById("sidebar-footer").style.display = "flex";

      document.getElementById("doc-name-text").textContent = data.filename;
      document.getElementById("doc-meta-text").textContent = `${data.pages} page${data.pages !== 1 ? "s" : ""} · ${data.chunks} chunks`;
      document.getElementById("summary-text").textContent = data.summary;
      document.getElementById("chat-header-doc").textContent = data.filename;
      document.getElementById("chat-header-doc").style.color = "#888";

      const container = document.getElementById("suggested-container");
      container.innerHTML = "";
      data.questions.forEach(q => {
        const btn = document.createElement("button");
        btn.className = "suggested-btn";
        btn.textContent = q;
        btn.onclick = () => askQuestion(q);
        container.appendChild(btn);
      });

      document.getElementById("empty-state").classList.add("hidden");
      document.getElementById("messages").classList.remove("hidden");
      document.getElementById("input-area").classList.remove("hidden");
      document.getElementById("question-input").disabled = false;
      document.getElementById("send-btn").disabled = false;

      docLoaded = true;
      messageCount = 0;
      updateCount();

      addMessage("bot", `Document loaded. I have read <strong>${data.filename}</strong> and I am ready to answer your questions.`);

    } catch (err) {
      alert("Failed to connect to server. Make sure server.py is running.");
      resetUpload();
    }
  }

  function resetUpload() {
    document.getElementById("processing").style.display = "none";
    document.getElementById("upload-zone").style.display = "block";
  }

  // ── Chat ───────────────────────────────────────────────────────────────────

  function addMessage(type, text) {
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = `message ${type}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";

    if (type === "bot") {
      avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>`;
    } else {
      avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = text.replace(/\n/g, "<br>");

    div.appendChild(avatar);
    div.appendChild(bubble);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;

    if (type !== "thinking") {
      messageCount++;
      updateCount();
    }
  }

  function addThinking() {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message bot thinking";
    div.id = "thinking-msg";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;

    div.appendChild(avatar);
    div.appendChild(bubble);
    messages.appendChild(div);
  }

  function removeThinking() {
    const el = document.getElementById("thinking-msg");
    if (el) el.remove();
  }

  function updateCount() {
    document.getElementById("chat-header-count").textContent = messageCount > 0 ? `${messageCount} message${messageCount !== 1 ? "s" : ""}` : "";
  }

  async function askQuestion(q) {
    addMessage("user", q);
    addThinking();
    setInputDisabled(true);

    try {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q })
      });
      const data = await res.json();
      removeThinking();
      addMessage("bot", data.answer || "No answer returned.");
    } catch (err) {
      removeThinking();
      addMessage("bot", "Something went wrong. Please try again.");
    }

    setInputDisabled(false);
    document.getElementById("question-input").focus();
  }

  function sendQuestion() {
    const input = document.getElementById("question-input");
    const q = input.value.trim();
    if (!q || !docLoaded) return;
    input.value = "";
    autoResize(input);
    askQuestion(q);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function setInputDisabled(val) {
    document.getElementById("question-input").disabled = val;
    document.getElementById("send-btn").disabled = val;
  }

  // ── Controls ───────────────────────────────────────────────────────────────

  function clearChat() {
    document.getElementById("messages").innerHTML = "";
    messageCount = 0;
    updateCount();
    addMessage("bot", "Chat cleared. Ask me anything about your document.");
  }

  async function newDoc() {
    await fetch(`${API}/clear`, { method: "POST" });
    document.getElementById("messages").classList.add("hidden");
    document.getElementById("input-area").classList.add("hidden");
    document.getElementById("empty-state").classList.remove("hidden");
    document.getElementById("doc-info").style.display = "none";
    document.getElementById("sidebar-footer").style.display = "none";
    document.getElementById("upload-zone").style.display = "block";
    document.getElementById("suggested-container").innerHTML = "";
    document.getElementById("summary-text").textContent = "";
    document.getElementById("doc-name-text").textContent = "";
    document.getElementById("chat-header-doc").textContent = "No document loaded";
    document.getElementById("chat-header-doc").style.color = "#bbb";
    document.getElementById("chat-header-count").textContent = "";
    document.getElementById("messages").innerHTML = "";
    document.getElementById("file-input").value = "";
    messageCount = 0;
    docLoaded = false;
  }
</script>
</body>
</html>
